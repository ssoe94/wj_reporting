name: Test and Deploy

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  workflow_dispatch:
    inputs:
      action:
        description: Run validation only or deploy the selected branch
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - test-only

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Validate application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-next/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix frontend-next

      - name: Lint legacy frontend
        run: npm --prefix frontend run lint

      - name: Build standalone beta frontend
        run: npm --prefix frontend-next run build

      - name: Build production frontend bundle
        run: npm --prefix frontend run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test --no-input

  deploy-main:
    name: Deploy production from main
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate production deploy hooks
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_BACKEND is not configured."
            exit 1
          fi
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_FRONTEND is not configured."
            exit 1
          fi

      - name: Deploy production backend
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"

      - name: Wait for backend health
        run: bash scripts/wait-health.sh https://wj-reporting-backend.onrender.com/api/health/ 300

      - name: Deploy production frontend
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"

  verify-main:
    name: Verify production deployment
    needs: deploy-main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for the production commit
        env:
          SITE_URL: https://wj-reporting.onrender.com
          EXPECTED_BRANCH: main
        run: bash scripts/wait-static-commit.sh "$SITE_URL" "$GITHUB_SHA" "$EXPECTED_BRANCH" 300

      - name: Run production smoke tests
        run: bash scripts/quick-smoke-test.sh

  deploy-beta:
    name: Deploy beta frontend from beta
    needs: test
    if: >-
      github.ref == 'refs/heads/beta' &&
      (github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'))
    runs-on: ubuntu-latest
    steps:
      - name: Validate beta deploy hook
        env:
          RENDER_DEPLOY_HOOK_FRONTEND_NEXT: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_NEXT }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND_NEXT" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_FRONTEND_NEXT is not configured."
            exit 1
          fi

      - name: Deploy beta frontend only
        env:
          RENDER_DEPLOY_HOOK_FRONTEND_NEXT: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND_NEXT }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FRONTEND_NEXT"

  verify-beta:
    name: Verify beta deployment
    needs: deploy-beta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Wait for the beta commit
        env:
          SITE_URL: https://frontend-next-zjk1.onrender.com
          EXPECTED_BRANCH: beta
        run: bash scripts/wait-static-commit.sh "$SITE_URL" "$GITHUB_SHA" "$EXPECTED_BRANCH" 300

      - name: Verify beta routes and shared API
        run: |
          curl -fsS https://frontend-next-zjk1.onrender.com/production > /dev/null
          curl -fsS https://frontend-next-zjk1.onrender.com/mes/monitoring > /dev/null
          CONTENT_TYPE=$(curl -sSI https://frontend-next-zjk1.onrender.com/api/health/ | awk -F': ' 'tolower($1) == "content-type" {print tolower($2)}' | tr -d '\r')
          if [[ "$CONTENT_TYPE" != *"application/json"* ]]; then
            echo "::error::Beta /api proxy did not return JSON: $CONTENT_TYPE"
            exit 1
          fi
