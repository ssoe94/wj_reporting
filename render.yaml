# Environment variable group to share secrets between services
envVarGroups:
  - name: shared-secrets
    # NOTE: Create this group in Render > Environment and add secrets like
    # DATABASE_URL and SECRET_KEY there. These are shared by the backend and cron jobs.

services:
  # Frontend Static Site
  - type: static
    name: wj_reporting
    branch: main
    autoDeployTrigger: off
    rootDir: frontend
    buildCommand: node ../scripts/build-render-static.mjs
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://wj-reporting-backend.onrender.com/api/*
      - type: rewrite
        source: /next/login
        destination: /next/index.html
      - type: rewrite
        source: /next/login/
        destination: /next/index.html
      - type: rewrite
        source: /next/production
        destination: /next/index.html
      - type: rewrite
        source: /next/production/
        destination: /next/index.html
      - type: rewrite
        source: /next/production/plans
        destination: /next/index.html
      - type: rewrite
        source: /next/production/plans/
        destination: /next/index.html
      - type: rewrite
        source: /next/production/injection-board
        destination: /next/production/injection-board/index.html
      - type: rewrite
        source: /next/production/injection-board/
        destination: /next/production/injection-board/index.html
      - type: rewrite
        source: /next/mes/monitoring
        destination: /next/index.html
      - type: rewrite
        source: /next/mes/monitoring/
        destination: /next/index.html
      - type: redirect
        source: /injection/monitoring
        destination: /mes/monitoring
      - type: rewrite
        source: /*
        destination: /index.html

  # Standalone next-generation frontend.
  # This service is the source-of-truth UI for the rebuilt production/MES pages.
  # The legacy wj_reporting static site bundles the same frontend-next build under /next.
  - type: static
    name: frontend-next-zjk1
    branch: beta
    autoDeployTrigger: off
    rootDir: frontend-next
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: /api
      - key: VITE_MES_API_BASE_URL
        value: /api
      - key: VITE_USE_REMOTE_PRODUCTION_API
        value: "true"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://wj-reporting-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend Web Service
  - type: web
    name: wj_reporting_backend
    branch: main
    autoDeployTrigger: off
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --preload
    envVarGroup: shared-secrets

  # Daily Inventory Snapshot Cron Job
  - type: cron
    name: daily-inventory-snapshot
    env: python
    rootDir: backend
    schedule: "0 0 * * *"  # 00:00 UTC = 08:00 CST
    # Use the same build command as the backend for consistency
    buildCommand: bash build.sh
    # The management command should ideally get the date itself
    startCommand: python manage.py daily_snapshot_auto
    # Connect to the same shared environment variables to access the database etc.
    envVarGroup: shared-secrets

  # Injection Monitoring Snapshot (every 2 minutes)
  - type: cron
    name: interval-injection-snapshot
    env: python
    rootDir: backend
    schedule: "*/2 * * * *"  # Runs every 2 minutes (UTC)
    buildCommand: bash build.sh
    startCommand: python run_hourly_snapshot.py
    envVarGroup: shared-secrets

  # MES Progress Report Sync (initial 24h backfill, then incremental 5min)
  - type: cron
    name: production-mes-progress-sync
    env: python
    rootDir: backend
    schedule: "*/5 * * * *"
    buildCommand: bash build.sh
    startCommand: python manage.py sync_mes_progress_reports
    envVarGroup: shared-secrets
